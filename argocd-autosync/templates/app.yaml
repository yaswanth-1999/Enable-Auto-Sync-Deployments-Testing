apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-autosync
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/<your-username>/<repo>.git
    targetRevision: HEAD
    path: argocd-autosync

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true        # ✅ Removes deleted resources
      selfHeal: true     # ✅ Fixes manual changes
    syncOptions:
      - CreateNamespace=true
