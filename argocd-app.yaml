apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-autosync
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/yaswanth-1999/Enable-Auto-Sync-Deployments-Testing.git
    targetRevision: HEAD
    path: argocd-autosync

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
